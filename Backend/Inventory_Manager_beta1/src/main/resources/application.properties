spring.application.name=Inventory_Manager_beta1

#MariaDB Remote Database
spring.datasource.url=jdbc:mysql://coms-3090-013.class.las.iastate.edu:3306/roundtrip_db
spring.datasource.username=backend_user
spring.datasource.password=backend123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

#H2 Console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

#H2 Database FOR TESTING
#spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=MySQL
#spring.datasource.driver-class-name=org.h2.Driver
#spring.datasource.username=sa
#spring.datasource.password=password

#Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
#spring.jpa.database-platform=org.hibernate.dialect.MariaDBDialect
spring.jpa.defer-datasource-initialization=true
spring.jpa.open-in-view=false

#Jackson date formatting
spring.jackson.serialization.write-dates-as-timestamps=false

#Better error messages
server.error.include-message=always
server.error.include-stacktrace=always

#Session properties
jwt.secret=inventory-manager-secret-key-for-sessions
jwt.expiration-ms=86400000

server.address=0.0.0.0
server.port=8080