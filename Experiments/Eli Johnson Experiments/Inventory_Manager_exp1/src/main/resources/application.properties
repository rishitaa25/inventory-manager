spring.application.name=Inventory_Manager_exp1
spring.jpa.hibernate.ddl-auto=create-drop
# Show SQL queries in console (helpful for debugging)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Show parameter values in SQL queries
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# H2 Console (if using H2 database for development)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Better error messages in development
server.error.include-message=always
server.error.include-stacktrace=always

# Set server port (default is 8080)
server.port=8080

# Database connection (example for H2 in-memory)
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.username=sa
spring.datasource.password=